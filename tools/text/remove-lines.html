<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Empty Lines | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Remove Empty Lines</h1>
                    <p>Quickly strip all blank lines from your text or code.</p>
                </div>

                <div class="tool-body">
                    <textarea id="text-input" class="tool-input" placeholder="Paste text here..."></textarea>
                    
                    <div style="display:flex; gap:0.5rem; margin-bottom: 2rem;">
                        <button class="btn" onclick="removeLines()">Remove Blank Lines</button>
                        <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('text-input');

        function removeLines() {
            input.value = input.value.split('\n').filter(line => line.trim() !== '').join('\n');
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
