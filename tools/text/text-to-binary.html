<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Binary Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Text to Binary</h1>
                    <p>Convert plain text into binary code and back.</p>
                </div>

                <div class="tool-body">
                    <textarea id="text-input" class="tool-input" placeholder="Start typing..."></textarea>
                    
                    <div style="display:flex; gap:0.5rem; margin-bottom: 2rem;">
                        <button class="btn" onclick="toBinary()">Text to Binary</button>
                        <button class="btn" onclick="toText()">Binary to Text</button>
                        <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('text-input');

        function toBinary() {
            input.value = input.value.split('').map(char => char.charCodeAt(0).toString(2).padStart(8, '0')).join(' ');
        }

        function toText() {
            try {
                input.value = input.value.split(' ').map(bin => String.fromCharCode(parseInt(bin, 2))).join('');
            } catch(e) {
                alert('Invalid Binary format');
            }
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
