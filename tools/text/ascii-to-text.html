<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASCII to Text Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>ASCII to Text</h1>
                    <p>Convert decimal ASCII codes back into readable text.</p>
                </div>

                <div class="tool-body">
                    <textarea id="ascii-input" class="tool-input" placeholder="72 101 108 108 111..."></textarea>
                    
                    <button class="btn w-full" onclick="fromASCII()" style="width:100%;">Convert to Text</button>
                    
                    <button class="btn mt-4" onclick="copyResult()" style="background:#10b981; margin-top:1rem;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('ascii-input');
        function fromASCII() {
            input.value = input.value.split(' ').map(c => String.fromCharCode(parseInt(c))).join('');
        }
        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
