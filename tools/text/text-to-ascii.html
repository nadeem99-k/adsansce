<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to ASCII Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Text to ASCII Codes</h1>
                    <p>Convert text into decimal ASCII codes.</p>
                </div>

                <div class="tool-body">
                    <textarea id="ascii-input" class="tool-input" placeholder="Type text here..."></textarea>
                    
                    <button class="btn w-full" onclick="toASCII()" style="width:100%;">Convert to ASCII</button>
                    
                    <button class="btn mt-4" onclick="copyResult()" style="background:#10b981; margin-top:1rem;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('ascii-input');
        function toASCII() {
            input.value = input.value.split('').map(c => c.charCodeAt(0)).join(' ');
        }
        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
