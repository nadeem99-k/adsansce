<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to Sepia Filter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Sepia Photo Filter</h1>
                    <p>Give your photos a vintage look with a warm sepia tone instantly.</p>
                </div>

                <div class="tool-body">
                    <input type="file" id="img-input" class="tool-input" style="min-height:unset;" accept="image/*">
                    
                    <div id="res-area" style="margin-top:2rem; text-align:center; display:none;">
                        <canvas id="canvas" style="max-width:100%; border:1px solid var(--border); border-radius:8px;"></canvas>
                        <div style="margin-top:1rem;">
                            <button class="btn" onclick="download()" style="background:#10b981;">Download Sepia</button>
                        </div>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('img-input');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        input.onchange = (e) => {
            const file = e.target.files[0];
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    data[i]     = (r * .393) + (g *.769) + (b * .189);
                    data[i+1]   = (r * .349) + (g *.686) + (b * .168);
                    data[i+2]   = (r * .272) + (g *.534) + (b * .131);
                }
                ctx.putImageData(imageData, 0, 0);
                document.getElementById('res-area').style.display = 'block';
            };
            img.src = URL.createObjectURL(file);
        };

        function download() {
            const link = document.createElement('a');
            link.download = 'sepia.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
