<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ad Revenue Calculator (RPM) | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Ad Revenue Calculator</h1>
                    <p>Estimate your earnings based on Page Views and RPM (Revenue Per Mille).</p>
                </div>

                <div class="tool-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-bottom: 2rem;">
                        <div>
                            <label>Page Views</label>
                            <input type="number" id="views" value="10000" class="tool-input" style="min-height:unset;" oninput="calc()">
                        </div>
                        <div>
                            <label>RPM ($)</label>
                            <input type="number" id="rpm" value="5" class="tool-input" style="min-height:unset;" oninput="calc()">
                        </div>
                    </div>

                    <div class="card" style="background:var(--bg-alt); text-align:center;">
                        <div style="font-size:0.8rem; color:var(--text-dim);">Estimated Earnings</div>
                        <h2 id="earn-res" style="font-size:2.5rem; color:var(--primary);">$50.00</h2>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function calc() {
            const views = parseFloat(document.getElementById('views').value);
            const rpm = parseFloat(document.getElementById('rpm').value);
            if(!isNaN(views) && !isNaN(rpm)) {
                const earnings = (views / 1000) * rpm;
                document.getElementById('earn-res').textContent = `$${earnings.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            }
        }
    </script>
</body>
</html>
