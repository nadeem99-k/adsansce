<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Meta Tag Generator</h1>
                    <p>Create SEO-ready meta tags for your website.</p>
                </div>

                <div class="tool-body">
                    <div style="display:grid; grid-template-columns: 1fr; gap:1rem; margin-bottom: 2rem;">
                        <input type="text" id="meta-title" class="tool-input" style="min-height:unset;" placeholder="Site Title">
                        <textarea id="meta-desc" class="tool-input" style="min-height:100px;" placeholder="Site Description"></textarea>
                        <input type="text" id="meta-keys" class="tool-input" style="min-height:unset;" placeholder="Keywords (comma separated)">
                    </div>

                    <button class="btn w-full" onclick="genMeta()" style="width:100%;">Generate Tags</button>

                    <textarea id="meta-output" class="tool-input" style="margin-top:2rem; font-family:monospace;" readonly></textarea>
                    
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Code</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function genMeta() {
            const title = document.getElementById('meta-title').value;
            const desc = document.getElementById('meta-desc').value;
            const keys = document.getElementById('meta-keys').value;
            
            const tags = `<!-- Primary Meta Tags -->
<title>${title}</title>
<meta name="title" content="${title}">
<meta name="description" content="${desc}">
<meta name="keywords" content="${keys}">`;

            document.getElementById('meta-output').value = tags;
        }

        function copyResult() {
            const out = document.getElementById('meta-output');
            out.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
