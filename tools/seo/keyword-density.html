<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Density Checker | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Keyword Density Checker</h1>
                    <p>Analyze how often specific words appear in your content.</p>
                </div>

                <div class="tool-body">
                    <textarea id="text-input" class="tool-input" placeholder="Paste your article here..."></textarea>
                    
                    <button class="btn w-full" onclick="checkDensity()" style="width:100%;">Check Density</button>

                    <div id="density-result" class="mt-8" style="display:none;">
                        <h3 style="margin-bottom:1rem;">Top Keywords</h3>
                        <table style="width:100%; border-collapse:collapse;" id="density-table">
                            <thead>
                                <tr style="text-align:left; border-bottom:2px solid var(--border);">
                                    <th style="padding:0.5rem;">Word</th>
                                    <th style="padding:0.5rem;">Count</th>
                                    <th style="padding:0.5rem;">Density</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function checkDensity() {
            const text = document.getElementById('text-input').value.toLowerCase();
            const words = text.match(/\b\w+\b/g);
            if(!words) return;

            const freq = {};
            words.forEach(w => {
                if(w.length > 3) freq[w] = (freq[w] || 0) + 1;
            });

            const sorted = Object.entries(freq).sort((a,b) => b[1] - a[1]).slice(0, 10);
            const tbody = document.querySelector('#density-table tbody');
            tbody.innerHTML = '';

            sorted.forEach(([word, count]) => {
                const density = ((count / words.length) * 100).toFixed(2);
                tbody.innerHTML += `
                    <tr style="border-bottom:1px solid var(--border);">
                        <td style="padding:0.5rem;">${word}</td>
                        <td style="padding:0.5rem;">${count}</td>
                        <td style="padding:0.5rem;">${density}%</td>
                    </tr>
                `;
            });

            document.getElementById('density-result').style.display = 'block';
        }
    </script>
</body>
</html>
