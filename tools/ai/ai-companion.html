<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Companion Chat | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .chat-box { height: 400px; overflow-y: auto; padding: 1rem; background: var(--glass-heavy); border-radius: 12px; border: 1px solid rgba(255, 105, 180, 0.3); display: flex; flex-direction: column; gap: 0.75rem; }
        .msg { max-width: 80%; padding: 0.75rem 1rem; border-radius: 12px; font-size: 0.95rem; }
        .msg.bot { align-self: flex-start; background: rgba(255, 105, 180, 0.1); color: #ff69b4; border-bottom-left-radius: 2px; border: 1px solid rgba(255, 105, 180, 0.2); }
        .msg.user { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 2px; }
    </style>
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1 style="color: #ff69b4;">AI Companion Chat</h1>
                    <p>A specialized AI companion for friendly, caring, and conversational chats. Choose a persona and start talking.</p>
                </div>

                <div class="tool-body">
                    <div style="margin-bottom:1.5rem; display:flex; gap:1rem;">
                        <select id="persona" class="tool-input" style="min-height:unset;">
                            <option value="gf">AI Girlfriend</option>
                            <option value="bf">AI Boyfriend</option>
                        </select>
                    </div>

                    <div id="chat-box" class="chat-box">
                        <div class="msg bot">Hi! I'm so glad you're here. How was your day? ❤️</div>
                    </div>

                    <div style="display:flex; gap:1rem; margin-top:1.5rem;">
                        <input type="text" id="user-input" class="tool-input" style="min-height:unset;" placeholder="Say something sweet..." onkeypress="if(event.key==='Enter') send()">
                        <button class="btn" style="background:#ff69b4;" onclick="send()">Chat</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        async function send() {
            const input = document.getElementById('user-input');
            const box = document.getElementById('chat-box');
            const text = input.value.trim();
            if(!text) return;

            box.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = "";
            box.scrollTop = box.scrollHeight;

            const botMsg = document.createElement('div');
            botMsg.className = "msg bot";
            botMsg.textContent = "...";
            box.appendChild(botMsg);

            try {
                const url = `https://vern-rest-api.vercel.app/api/aigf?message=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                botMsg.textContent = data.response || "I'm lost in thought... say something else?";
            } catch(e) {
                botMsg.textContent = "Oops, I disconnected for a second. Try again?";
            }
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
