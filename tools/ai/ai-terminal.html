<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Linux Terminal | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        #terminal { background: #000; color: #4ade80; padding: 1.5rem; font-family: 'Fira Code', 'Courier New', monospace; font-size: 0.95rem; line-height: 1.4; height: 500px; overflow: auto; border-radius: 12px; border: 4px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .prompt { color: #38bdf8; font-weight: bold; }
        .input-line { display: flex; gap: 0.5rem; }
        #command-input { background: transparent; border: none; color: #4ade80; font-family: inherit; font-size: inherit; outline: none; flex: 1; }
        .cursor { width: 8px; height: 18px; background: #4ade80; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .history-line { margin-bottom: 0.5rem; white-space: pre-wrap; }
    </style>
</head>
<body>
    <header></header>
    <main class="container">
        <div class="tool-header">
            <h1>AI Linux Cloud Terminal 🐧</h1>
            <p style="color:var(--text-dim);">A stateful, AI-powered Ubuntu simulation. Run commands, create files, and explore a virtual cloud environment.</p>
        </div>

        <div class="card" style="padding: 1rem;">
            <div id="terminal" onclick="document.getElementById('command-input').focus()">
                <div id="history">
                    <div class="history-line">OmniTerminal v1.0.0 (Ubuntu 22.04 LTS)</div>
                    <div class="history-line">Welcome to the AI Cloud Terminal. Type 'help' to start.</div>
                    <div class="history-line">---</div>
                </div>
                <div class="input-line">
                    <span class="prompt" id="current-prompt">root@omni:~$</span>
                    <input type="text" id="command-input" autofocus>
                </div>
            </div>
        </div>

        <div style="margin-top: 2rem; display:flex; gap: 1rem; justify-content:center;">
             <button class="pill" onclick="Terminal.clear()">Clear Screen</button>
             <button class="pill" onclick="Terminal.resetSession()">Reset Filesystem</button>
        </div>
    </main>
    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const Terminal = {
            history: document.getElementById('history'),
            input: document.getElementById('command-input'),
            prompt: document.getElementById('current-prompt'),
            pwd: '~',
            fs: JSON.parse(localStorage.getItem('omni_vfs') || '{"root": {}}'),

            init() {
                this.input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') this.execute();
                });
            },

            async execute() {
                const cmd = this.input.value.trim();
                if (!cmd) return;

                this.appendLine(`${this.prompt.innerText} ${cmd}`);
                this.input.value = '';
                this.input.disabled = true;

                if (cmd === 'clear') {
                     this.clear();
                     this.input.disabled = false;
                     return;
                }

                if (cmd === 'help') {
                    this.appendLine("Available commands: ls, cd, mkdir, touch, cat, whoami, pwd, help, [any linux command]");
                    this.input.disabled = false;
                    return;
                }

                try {
                    const response = await OmniAPI.fetch(`https://vern-rest-api.vercel.app/api/chatgpt4?prompt=Act as a Linux Terminal. Current Path: ${this.pwd}. Virtual Filesystem Status: ${JSON.stringify(this.fs)}. The user ran this command: ${cmd}. Give the EXACT terminal output only. If it involves a change in file system, provide a JSON block at the end like [[FILESYSTEM_UPDATE: ...]]. No talk.`);
                    let output = response.answer || "Command not found.";
                    
                    // Handle FS updates from AI
                    if (output.includes('[[FILESYSTEM_UPDATE:')) {
                        const parts = output.split('[[FILESYSTEM_UPDATE:');
                        output = parts[0].trim();
                        try {
                            const fsData = JSON.parse(parts[1].split(']]')[0]);
                            this.fs = fsData;
                            localStorage.setItem('omni_vfs', JSON.stringify(this.fs));
                        } catch(err) {}
                    }

                    // Handle PWD changes
                    if (cmd.startsWith('cd ')) {
                        const target = cmd.split(' ')[1];
                        if (target === '..') this.pwd = '~';
                        else this.pwd = `~/${target}`;
                        this.prompt.innerText = `root@omni:${this.pwd}$`;
                    }

                    this.appendLine(output);
                } catch (e) {
                    this.appendLine("Error connecting to cloud kernel.");
                } finally {
                    this.input.disabled = false;
                    this.input.focus();
                }
            },

            appendLine(txt) {
                const line = document.createElement('div');
                line.className = 'history-line';
                line.innerText = txt;
                this.history.appendChild(line);
                document.getElementById('terminal').scrollTop = document.getElementById('terminal').scrollHeight;
            },

            clear() {
                this.history.innerHTML = '<div class="history-line">OmniTerminal v1.0.0 (Cleared)</div>';
            },

            resetSession() {
                localStorage.removeItem('omni_vfs');
                this.fs = {root: {}};
                this.pwd = '~';
                this.prompt.innerText = 'root@omni:~$';
                OmniUI.showToast('Cloud Filesystem Reset.');
                this.clear();
            }
        };

        document.addEventListener('DOMContentLoaded', () => Terminal.init());
    </script>
</body>
</html>
