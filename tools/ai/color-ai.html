<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Color Picker & Palette | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        html, body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        #res-area {
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .color-swatch {
            height: 80px;
            border-radius: 8px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .hex-code {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-family: monospace;
        }

        @media (max-width: 768px) {
            #res-area {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .input-group {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            #res-area {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>AI Color Artist</h1>
                    <p>Describe a theme and let AI design a perfect HEX color palette for you.</p>
                </div>

                <div class="tool-body">
                    <div class="input-group">
                        <input type="text" id="theme" class="tool-input" style="min-height:unset;" placeholder="Cyberpunk Night...">
                        <button class="btn" onclick="gen()">Generate</button>
                    </div>

                    <div id="res-area">
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        async function gen() {
            const theme = document.getElementById('theme').value;
            const res = document.getElementById('res-area');
            if(!theme) return;
            
            res.style.display = 'grid';
            res.innerHTML = "Consulting the palette...";

            try {
                const prompt = `Generate a 5-color hex palette for: ${theme}. Return ONLY a comma separated list of HEX codes.`;
                const url = `https://vern-rest-api.vercel.app/api/chatgpt4?prompt=${encodeURIComponent(prompt)}`;
                const resp = await fetch(url);
                const data = await resp.json();
                
                const hexes = data.response.match(/#[A-Fa-f0-9]{6}/g);
                res.innerHTML = hexes.map(hex => `
                    <div style="text-align:center;">
                        <div class="color-swatch" style="background:${hex};" onclick="navigator.clipboard.writeText('${hex}'); alert('Copied!')"></div>
                        <div class="hex-code">${hex}</div>
                    </div>
                `).join('');
            } catch(e) {
                res.textContent = "Error.";
            }
        }
    </script>
</body>
</html>
