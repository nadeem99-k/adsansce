<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Secure Password Generator</h1>
                    <p>Generate highly secure, random passwords instantly.</p>
                </div>

                <div class="tool-body">
                    <div style="background:#f1f5f9; padding:1.5rem; border-radius:8px; display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; border:1px solid var(--border);">
                        <span id="pass-output" style="font-family:monospace; font-size:1.5rem; font-weight:700; word-break:break-all;">Click Generate</span>
                        <button class="btn" onclick="copyPass()" style="background:#10b981;">Copy</button>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-bottom: 2rem;">
                        <div>
                            <label style="display:block; margin-bottom:0.5rem; font-size:0.9rem;">Length: <span id="len-val">16</span></label>
                            <input type="range" id="pass-length" min="8" max="64" value="16" style="width:100%;" oninput="document.getElementById('len-val').textContent = this.value">
                        </div>
                        <div style="display:flex; flex-direction:column; gap:0.5rem;">
                            <label><input type="checkbox" id="inc-nums" checked> Include Numbers</label>
                            <label><input type="checkbox" id="inc-syms" checked> Include Symbols</label>
                        </div>
                    </div>

                    <button class="btn w-full" onclick="genPass()" style="width:100%;">Generate Secure Password</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const output = document.getElementById('pass-output');
        const lengthInput = document.getElementById('pass-length');
        const numsInput = document.getElementById('inc-nums');
        const symsInput = document.getElementById('inc-syms');

        function genPass() {
            const charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ" + 
                            (numsInput.checked ? "0123456789" : "") + 
                            (symsInput.checked ? "!@#$%^&*()_+~`|}{[]:;?><,./-=" : "");
            let retVal = "";
            for (let i = 0; i < lengthInput.value; ++i) {
                retVal += charset.charAt(Math.floor(Math.random() * charset.length));
            }
            output.textContent = retVal;
        }

        function copyPass() {
            navigator.clipboard.writeText(output.textContent);
            alert('Password copied!');
        }
    </script>
</body>
</html>
