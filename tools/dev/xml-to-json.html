<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XML to JSON Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>XML to JSON</h1>
                    <p>Convert XML data structures into JSON format instantly.</p>
                </div>

                <div class="tool-body">
                    <textarea id="xml-input" class="tool-input" placeholder="Paste XML here..." style="font-family:monospace;"></textarea>
                    
                    <button class="btn" onclick="convert()">Convert to JSON</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('xml-input');

        function convert() {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(input.value, "text/xml");
            
            function xml2json(xml) {
                let obj = {};
                if (xml.nodeType == 1) { 
                    if (xml.attributes.length > 0) {
                        obj["@attributes"] = {};
                        for (let j = 0; j < xml.attributes.length; j++) {
                            let attribute = xml.attributes.item(j);
                            obj["@attributes"][attribute.nodeName] = attribute.nodeValue;
                        }
                    }
                } else if (xml.nodeType == 3) { 
                    obj = xml.nodeValue;
                }
                if (xml.hasChildNodes()) {
                    for (let i = 0; i < xml.childNodes.length; i++) {
                        let item = xml.childNodes.item(i);
                        let nodeName = item.nodeName;
                        if (typeof(obj[nodeName]) == "undefined") {
                            obj[nodeName] = xml2json(item);
                        } else {
                            if (typeof(obj[nodeName].push) == "undefined") {
                                let old = obj[nodeName];
                                obj[nodeName] = [];
                                obj[nodeName].push(old);
                            }
                            obj[nodeName].push(xml2json(item));
                        }
                    }
                }
                return obj;
            }

            try {
                const json = xml2json(xmlDoc);
                input.value = JSON.stringify(json, null, 2);
            } catch(e) {
                alert('Conversion failed: ' + e.message);
            }
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
