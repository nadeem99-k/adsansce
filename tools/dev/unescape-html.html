<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Entity Unescape | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>HTML Unescape</h1>
                    <p>Convert HTML entities back into their literal characters.</p>
                </div>

                <div class="tool-body">
                    <textarea id="unesc-input" class="tool-input" placeholder="&lt;div&gt;"></textarea>
                    
                    <button class="btn" onclick="unesc()">Unescape HTML</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('unesc-input');
        function unesc() {
            const doc = new DOMParser().parseFromString(input.value, "text/html");
            input.value = doc.documentElement.textContent;
        }
        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
