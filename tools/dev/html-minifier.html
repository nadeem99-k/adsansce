<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Minifier | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>HTML Minifier</h1>
                    <p>Compress your HTML code by removing whitespace and comments.</p>
                </div>

                <div class="tool-body">
                    <textarea id="html-input" class="tool-input" placeholder="Paste HTML here..." style="font-family:monospace;"></textarea>
                    
                    <div style="display:flex; gap:0.5rem; margin-bottom: 2rem;">
                        <button class="btn" onclick="minifyHTML()">Minify HTML</button>
                        <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('html-input');

        function minifyHTML() {
            input.value = input.value
                .replace(/<!--[\s\S]*?-->/g, '') // remove comments
                .replace(/\s+/g, ' ') // collapse whitespaces
                .replace(/>\s+</g, '><') // remove whitespace between tags
                .trim();
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
