<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regex Tester | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Regex Tester</h1>
                    <p>Test and debug regular expressions in real-time.</p>
                </div>

                <div class="tool-body">
                    <input type="text" id="regex-pattern" class="tool-input" style="min-height:unset; font-family:monospace;" placeholder="/pattern/g">
                    <textarea id="test-string" class="tool-input" placeholder="Enter string to test against..."></textarea>
                    
                    <div id="regex-match" class="card" style="margin-top:1rem; min-height:100px; display:none;">
                        <h3 style="margin-bottom:0.5rem; font-size:1rem;">Matches Found</h3>
                        <div id="match-results" style="font-family:monospace;"></div>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const patternInput = document.getElementById('regex-pattern');
        const testInput = document.getElementById('test-string');
        const matchDisplay = document.getElementById('regex-match');
        const matchResults = document.getElementById('match-results');

        function runRegex() {
            const patternStr = patternInput.value;
            const testStr = testInput.value;
            
            if(!patternStr || !testStr) return;

            try {
                // Parse pattern like /foo/g
                const parts = patternStr.split('/');
                const pattern = parts[1] || parts[0];
                const flags = parts[2] || '';
                const regex = new RegExp(pattern, flags);
                const matches = testStr.match(regex);

                if(matches) {
                    matchResults.textContent = matches.join(', ');
                    matchDisplay.style.display = 'block';
                } else {
                    matchResults.textContent = 'No matches found';
                    matchDisplay.style.display = 'block';
                }
            } catch(e) {
                matchResults.textContent = 'Error: ' + e.message;
                matchDisplay.style.display = 'block';
            }
        }

        patternInput.addEventListener('input', runRegex);
        testInput.addEventListener('input', runRegex);
    </script>
</body>
</html>
