<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URL Encode/Decode | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>URL Encode/Decode</h1>
                    <p>Safely encode or decode URL parameters.</p>
                </div>

                <div class="tool-body">
                    <textarea id="url-input" class="tool-input" placeholder="Enter URL or text to process..."></textarea>
                    
                    <div style="display:flex; gap:0.5rem; margin-bottom: 2rem;">
                        <button class="btn" onclick="process('encode')">Encode URL</button>
                        <button class="btn" onclick="process('decode')">Decode URL</button>
                        <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('url-input');

        function process(type) {
            try {
                if(type === 'encode') input.value = encodeURIComponent(input.value);
                else input.value = decodeURIComponent(input.value);
            } catch(e) {
                alert('Process failed: ' + e.message);
            }
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
