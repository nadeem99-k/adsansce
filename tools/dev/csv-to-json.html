<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CSV to JSON Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>CSV to JSON Converter</h1>
                    <p>Quickly convert your spreadsheet data (CSV) into JSON objects.</p>
                </div>

                <div class="tool-body">
                    <textarea id="csv-input" class="tool-input" placeholder="name,age\nJohn,30\nJane,25"></textarea>
                    
                    <button class="btn" onclick="toCSV()">Convert to JSON</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('csv-input');

        function toCSV() {
            const lines = input.value.split('\n');
            const headers = lines[0].split(',');
            const result = [];

            for(let i=1; i<lines.length; i++) {
                if(!lines[i]) continue;
                const obj = {};
                const currentline = lines[i].split(',');
                headers.forEach((h, j) => obj[h.trim()] = currentline[j]?.trim());
                result.push(obj);
            }
            input.value = JSON.stringify(result, null, 2);
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
