<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Minifier & Compressor | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>JS Minifier</h1>
                    <p>Compress your JavaScript code by removing comments and extra whitespace.</p>
                </div>

                <div class="tool-body">
                    <textarea id="js-input" class="tool-input" placeholder="function hello() { console.log('hi'); } // comment"></textarea>
                    
                    <button class="btn" onclick="minify()">Minify JS</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('js-input');
        function minify() {
            let js = input.value;
            js = js.replace(/\/\*[\s\S]*?\*\/|(?<=[^:])\/\/.*|^\/\/.*|(?<=\s)\/\/.*$/gm, ''); // limited comments
            js = js.replace(/\s+/g, ' '); // whitespace
            input.value = js.trim();
        }
        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
