<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to XML Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>JSON to XML</h1>
                    <p>Convert JSON data objects into XML tags instantly.</p>
                </div>

                <div class="tool-body">
                    <textarea id="json-input" class="tool-input" placeholder='{"user": "John", "age": 30}'></textarea>
                    
                    <button class="btn" onclick="convert()">Convert to XML</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('json-input');
        function convert() {
            try {
                const json = JSON.parse(input.value);
                function json2xml(obj, root = 'root') {
                    let xml = `<${root}>`;
                    for (let key in obj) {
                        if (typeof obj[key] === 'object') xml += json2xml(obj[key], key);
                        else xml += `<${key}>${obj[key]}</${key}>`;
                    }
                    xml += `</${root}>`;
                    return xml;
                }
                input.value = json2xml(json);
            } catch(e) {
                alert('Invalid JSON');
            }
        }
        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
