<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SQL Formatter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>SQL Formatter</h1>
                    <p>Format your complex SQL queries for better readability.</p>
                </div>

                <div class="tool-body">
                    <textarea id="sql-input" class="tool-input" placeholder="SELECT * FROM users WHERE active = 1..." style="font-family:monospace;"></textarea>
                    
                    <button class="btn" onclick="formatSQL()">Format SQL</button>
                    <button class="btn" onclick="copyResult()" style="background:#10b981;">Copy Result</button>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const input = document.getElementById('sql-input');

        function formatSQL() {
            let sql = input.value;
            const keywords = ['SELECT', 'FROM', 'WHERE', 'AND', 'OR', 'JOIN', 'LEFT', 'RIGHT', 'GROUP BY', 'ORDER BY', 'HAVING'];
            
            keywords.forEach(k => {
                const regex = new RegExp(`\\b${k}\\b`, 'gi');
                sql = sql.replace(regex, `\n${k}`);
            });
            
            input.value = sql.trim();
        }

        function copyResult() {
            input.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
