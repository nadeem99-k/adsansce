<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Temp Mail Suite | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        .mail-card { background: var(--glass-heavy); padding: 1.5rem; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .email-display { font-family: monospace; font-size: 1.2rem; color: var(--primary); margin: 1rem 0; padding: 0.5rem; background: rgba(0,0,0,0.2); border-radius: 4px; }
    </style>
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Temp Mail Suite</h1>
                    <p>Generate disposable burner emails to protect your privacy and avoid spam. Fast and keyless.</p>
                </div>

                <div class="tool-body">
                    <div class="mail-card">
                        <div style="font-size:0.8rem; color:var(--text-dim);">YOUR TEMP EMAIL</div>
                        <div id="email" class="email-display">Click generate to start</div>
                        <div style="display:flex; gap:1rem; justify-content:center;">
                            <button class="btn" onclick="gen()">Generate New</button>
                            <button class="btn" style="background:var(--bg-accent);" onclick="copy()">Copy Email</button>
                        </div>
                    </div>

                    <div id="inbox" class="mt-10">
                        <h3 style="margin-bottom:1.5rem;">Inbox</h3>
                        <div id="inbox-list" class="card" style="background:var(--glass-heavy); min-height:100px; display:flex; align-items:center; justify-content:center; color:var(--text-dim);">
                            Your inbox will appear here. Refreshing every 10 seconds...
                        </div>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        let currentEmail = "";

        async function gen() {
            const emailDiv = document.getElementById('email');
            emailDiv.textContent = "Creating...";

            try {
                const response = await fetch('https://vern-rest-api.vercel.app/api/tempmail');
                const data = await response.json();
                if(data.email) {
                    currentEmail = data.email;
                    emailDiv.textContent = currentEmail;
                }
            } catch(e) {
                emailDiv.textContent = "Error creating mail.";
            }
        }

        function copy() {
            if(!currentEmail) return;
            navigator.clipboard.writeText(currentEmail);
            alert('Copied to clipboard!');
        }

        // Automatic inbox check could go here if API supports it
    </script>
</body>
</html>
