<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Unit Converter</h1>
                    <p>Convert common units of length, weight, and more.</p>
                </div>

                <div class="tool-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-bottom: 2rem;">
                        <div>
                            <input type="number" id="unit-val" value="1" class="tool-input" style="min-height:unset;" oninput="convert()">
                            <select id="unit-from" class="tool-input" style="min-height:unset;" onchange="convert()">
                                <option value="m">Meters (m)</option>
                                <option value="km">Kilometers (km)</option>
                                <option value="mi">Miles (mi)</option>
                                <option value="ft">Feet (ft)</option>
                            </select>
                        </div>
                        <div>
                            <input type="number" id="unit-result" class="tool-input" style="min-height:unset;" readonly>
                            <select id="unit-to" class="tool-input" style="min-height:unset;" onchange="convert()">
                                <option value="km">Kilometers (km)</option>
                                <option value="m">Meters (m)</option>
                                <option value="mi">Miles (mi)</option>
                                <option value="ft">Feet (ft)</option>
                            </select>
                        </div>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const factors = {
            m: 1,
            km: 1000,
            mi: 1609.34,
            ft: 0.3048
        };

        function convert() {
            const val = document.getElementById('unit-val').value;
            const from = document.getElementById('unit-from').value;
            const to = document.getElementById('unit-to').value;
            
            if(val) {
                const result = (val * factors[from]) / factors[to];
                document.getElementById('unit-result').value = result.toFixed(4);
            }
        }
        convert();
    </script>
</body>
</html>
