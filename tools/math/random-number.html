<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Random Number Generator | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Random Number Gen</h1>
                    <p>Generate truly random numbers within any range.</p>
                </div>

                <div class="tool-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-bottom: 2rem;">
                        <div>
                            <label>Min</label>
                            <input type="number" id="min-r" value="1" class="tool-input" style="min-height:unset;">
                        </div>
                        <div>
                            <label>Max</label>
                            <input type="number" id="max-r" value="100" class="tool-input" style="min-height:unset;">
                        </div>
                    </div>

                    <button class="btn w-full" onclick="gen()">Generate Number</button>

                    <div id="ran-result" class="card mt-8" style="display:none; text-align:center; background:var(--bg-alt); margin-top:2rem;">
                        <h2 id="ran-val" style="font-size:3rem; color:var(--primary);">42</h2>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function gen() {
            const min = parseInt(document.getElementById('min-r').value);
            const max = parseInt(document.getElementById('max-r').value);
            if(!isNaN(min) && !isNaN(max)) {
                const res = Math.floor(Math.random() * (max - min + 1)) + min;
                document.getElementById('ran-val').textContent = res;
                document.getElementById('ran-result').style.display = 'block';
            }
        }
    </script>
</body>
</html>
