<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Scientific Calculator</h1>
                    <p>Advanced calculations including trigonometry and logarithms.</p>
                </div>

                <div class="tool-body">
                    <input type="text" id="calc-display" class="tool-input" style="text-align:right; font-size:2rem; min-height:80px;" readonly value="0">
                    
                    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:0.5rem; margin-top:1rem;">
                        <button class="btn" style="background:#ef4444;" onclick="clearCalc()">C</button>
                        <button class="btn" onclick="press('Math.sin(')">sin</button>
                        <button class="btn" onclick="press('Math.cos(')">cos</button>
                        <button class="btn" onclick="press('/')">/</button>

                        <button class="btn" onclick="press('7')">7</button>
                        <button class="btn" onclick="press('8')">8</button>
                        <button class="btn" onclick="press('9')">9</button>
                        <button class="btn" onclick="press('*')">*</button>

                        <button class="btn" onclick="press('4')">4</button>
                        <button class="btn" onclick="press('5')">5</button>
                        <button class="btn" onclick="press('6')">6</button>
                        <button class="btn" onclick="press('-')">-</button>

                        <button class="btn" onclick="press('1')">1</button>
                        <button class="btn" onclick="press('2')">2</button>
                        <button class="btn" onclick="press('3')">3</button>
                        <button class="btn" onclick="press('+')">+</button>

                        <button class="btn" onclick="press('0')">0</button>
                        <button class="btn" onclick="press('.')">.</button>
                        <button class="btn" onclick="press('Math.PI')">π</button>
                        <button class="btn" style="background:#10b981;" onclick="solve()">=</button>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        const display = document.getElementById('calc-display');
        let currentExp = "";

        function press(val) {
            currentExp += val;
            display.value = currentExp;
        }
        function clearCalc() {
            currentExp = "";
            display.value = "0";
        }
        function solve() {
            try {
                display.value = eval(currentExp);
                currentExp = display.value;
            } catch(e) {
                display.value = "Error";
                currentExp = "";
            }
        }
    </script>
</body>
</html>
