<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hex to Decimal Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Hex to Decimal</h1>
                    <p>Convert hexadecimal numbers (0-F) into base-10 decimal format.</p>
                </div>

                <div class="tool-body">
                    <input type="text" id="hex-v" class="tool-input" style="min-height:unset;" placeholder="Hex value (e.g. FF)..." oninput="conv()">
                    
                    <div class="card mt-8" style="background:var(--bg-alt); text-align:center; margin-top:2rem;">
                        <h2 id="dec-res" style="font-size:2.5rem; color:var(--primary);">0</h2>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function conv() {
            const hex = document.getElementById('hex-v').value;
            const dec = parseInt(hex, 16);
            document.getElementById('dec-res').textContent = isNaN(dec) ? 0 : dec;
        }
    </script>
</body>
</html>
