<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Increase & Decrease Calculator | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Percentage Increase/Decrease</h1>
                    <p>Calculate the percentage change between two values.</p>
                </div>

                <div class="tool-body">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem; margin-bottom: 2rem;">
                        <div>
                            <label>Starting Value</label>
                            <input type="number" id="v1" value="100" class="tool-input" style="min-height:unset;" oninput="calc()">
                        </div>
                        <div>
                            <label>Final Value</label>
                            <input type="number" id="v2" value="150" class="tool-input" style="min-height:unset;" oninput="calc()">
                        </div>
                    </div>

                    <div class="card" style="background:var(--bg-alt); text-align:center;">
                        <div style="font-size:0.8rem; color:var(--text-dim);">Percentage Change</div>
                        <h2 id="perc-res" style="font-size:2.5rem; color:#10b981;">+50.00%</h2>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function calc() {
            const v1 = parseFloat(document.getElementById('v1').value);
            const v2 = parseFloat(document.getElementById('v2').value);
            if(v1 !== 0 && !isNaN(v1) && !isNaN(v2)) {
                const diff = ((v2 - v1) / v1) * 100;
                const sign = diff >= 0 ? '+' : '';
                const el = document.getElementById('perc-res');
                el.textContent = `${sign}${diff.toFixed(2)}%`;
                el.style.color = diff >= 0 ? '#10b981' : '#ef4444';
            }
        }
    </script>
</body>
</html>
