<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decimal to Hex Converter | OmniToolbox</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body>
    <header></header>

    <main class="container">
        <div class="main-wrapper">
            <div class="card">
                <div class="tool-header">
                    <h1>Decimal to Hex</h1>
                    <p>Convert base-10 decimal numbers into hexadecimal format.</p>
                </div>

                <div class="tool-body">
                    <input type="number" id="dec-v" class="tool-input" style="min-height:unset;" placeholder="Decimal value..." oninput="conv()">
                    
                    <div class="card mt-8" style="background:var(--bg-alt); text-align:center; margin-top:2rem;">
                        <h2 id="hex-res" style="font-size:2.5rem; color:var(--primary);">0</h2>
                    </div>

                    <div class="ad-placeholder" style="margin-top:2rem;">In-Content Ad Slot</div>
                </div>
            </div>

            <aside></aside>
        </div>
    </main>

    <footer></footer>

    <script src="../../assets/js/core.js"></script>
    <script>
        function conv() {
            const dec = parseInt(document.getElementById('dec-v').value);
            document.getElementById('hex-res').textContent = isNaN(dec) ? '0' : dec.toString(16).toUpperCase();
        }
    </script>
</body>
</html>
